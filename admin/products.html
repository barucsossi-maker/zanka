  <div class="admin-main">
    <header class="admin-header">
      <div class="admin-header-left">
        <button class="admin-hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2>Produits</h2>
      </div>
      <div class="admin-header-right">
        <span class="admin-user" id="admin-user-name"></span>
        <a href="#" id="admin-logout-btn" class="btn-admin btn-admin-secondary btn-admin-sm" style="text-decoration:none;">Déconnexion</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-toolbar">
        <div class="admin-toolbar-left">
          <div class="admin-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Rechercher un produit...">
          </div>
          <select id="cat-filter" class="admin-select">
            <option value="">Toutes catégories</option>
            <option value="backpacks">Backpacks</option>
            <option value="hommes">Hommes</option>
            <option value="femmes">Femmes</option>
          </select>
        </div>
        <div class="admin-toolbar-right">
          <a href="product-edit.html" class="btn-admin btn-admin-primary">+ Nouveau produit</a>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-body" style="padding:0;">
          <table class="admin-table">
            <thead><tr><th>Produit</th><th>Catégorie</th><th>Prix</th><th>Stock</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody id="products-body"></tbody>
          </table>
          <div class="admin-empty" id="products-empty" style="display:none;"><p>Aucun produit trouvé.</p></div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    var PRODUITS = [
      { id: "zephyr", name: "Sac à Dos Zephyr", category: "backpacks", price: 850, comparePrice: null, stock: 12, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1601924994987-69e26d50e8bf?w=80&q=60", colors: ["Sable","Noir","Chocolat"] },
      { id: "aria", name: "Sac Cabas Aria", category: "femmes", price: 1450, comparePrice: 1800, stock: 5, isNew: false, isBestseller: true, image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=80&q=60", colors: ["Sable","Écru","Brun"] },
      { id: "berlinois", name: "Sacoche Berlinois", category: "hommes", price: 450, comparePrice: null, stock: 8, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=80&q=60", colors: ["Noir","Brun"] },
      { id: "lune", name: "Sac à Main Lune", category: "femmes", price: 1280, comparePrice: null, stock: 3, isNew: false, isBestseller: true, image: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=80&q=60", colors: ["Sable","Noir"] },
      { id: "voyageur", name: "Sac à Dos Voyageur", category: "backpacks", price: 1200, comparePrice: 1500, stock: 6, isNew: false, isBestseller: false, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=80&q=60", colors: ["Chocolat","Noir"] },
      { id: "nova", name: "Sac Bandoulière Nova", category: "femmes", price: 890, comparePrice: null, stock: 10, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?w=80&q=60", colors: ["Écru","Sable","Noir"] },
      { id: "executive", name: "Porte-Documents Executive", category: "hommes", price: 890, comparePrice: null, stock: 4, isNew: false, isBestseller: false, image: "https://images.unsplash.com/photo-1594226801341-41427b4e5c22?w=80&q=60", colors: ["Noir","Brun"] },
      { id: "soir", name: "Pochette du Soir", category: "femmes", price: 650, comparePrice: null, stock: 2, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1547949003-9792a18a2601?w=80&q=60", colors: ["Noir","Sable"] }
    ];
    var nomsCat = { backpacks: 'Backpacks', hommes: 'Hommes', femmes: 'Femmes' };
    function renderProducts(list) {
      var tbody = document.getElementById('products-body');
      var empty = document.getElementById('products-empty');
      tbody.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(function(p) {
        var badge = '';
        if (p.isNew) badge = '<span style="font-size:0.7rem;color:var(--admin-primary);font-weight:600;">Nouveau</span>';
        if (p.isBestseller) badge = '<span style="font-size:0.7rem;color:var(--admin-success);font-weight:600;">Best-seller</span>';
        var stockClass = p.stock <= 3 ? 'color:var(--admin-danger);' : p.stock <= 8 ? 'color:var(--admin-warning);' : 'color:var(--admin-success);';
        tbody.innerHTML += '<tr>' +
          '<td><div class="product-cell"><img src="' + p.image + '" alt="">' +
            '<div><strong>' + p.name + '</strong><br><span style="font-size:0.75rem;color:var(--admin-text-secondary);">' + p.colors.join(', ') + '</span></div>' +
          '</div></td>' +
          '<td>' + (nomsCat[p.category] || p.category) + ' ' + badge + '</td>' +
          '<td>' + formatPrix(p.price) + (p.comparePrice ? '<br><span style="font-size:0.75rem;text-decoration:line-through;color:var(--admin-text-secondary);">' + formatPrix(p.comparePrice) + '</span>' : '') + '</td>' +
          '<td><span style="font-weight:600;' + stockClass + '">' + p.stock + '</span></td>' +
          '<td>' + (p.stock > 0 ? '<span style="color:var(--admin-success);">En stock</span>' : '<span style="color:var(--admin-danger);">Rupture</span>') + '</td>' +
          '<td><a href="product-edit.html?id=' + p.id + '" class="btn-admin btn-admin-secondary btn-admin-xs">Modifier</a></td>' +
        '</tr>';
      });
    }
    renderProducts(PRODUITS);
    document.getElementById('search-input').addEventListener('input', filterProducts);
    document.getElementById('cat-filter').addEventListener('change', filterProducts);
    function filterProducts() {
      var q = document.getElementById('search-input').value.toLowerCase();
      var cat = document.getElementById('cat-filter').value;
      var filtered = PRODUITS.filter(function(p) {
        var m1 = !q || p.name.toLowerCase().indexOf(q) > -1 || p.id.indexOf(q) > -1;
        var m2 = !cat || p.category === cat;
        return m1 && m2;
      });
      renderProducts(filtered);
    }
  </script>
</body>
