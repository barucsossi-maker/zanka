<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — ZANKA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-login-body">
  <div class="admin-login-card">
    <h1>ZANKA</h1>
    <p>Tableau de bord administrateur</p>
    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="admin@zanka.fr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password">
      </div>
      <div class="admin-login-error" id="login-error"></div>
      <button type="submit" class="btn-admin btn-admin-primary" style="width:100%;justify-content:center;padding:14px;font-size:1rem;">
        Se connecter
      </button>
      <p style="text-align:center;margin-top:20px;font-size:0.75rem;color:#999;">
        <a href="../index.html" style="color:#8b6f52;">&larr; Retour au site</a>
      </p>
      <p style="text-align:center;margin-top:8px;font-size:0.7rem;color:#bbb;">
        Mode démo : admin@zanka.fr / admin123
      </p>
    </form>
  </div>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn = this.querySelector('button[type="submit"]');
      var errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Connexion...';
      errEl.style.display = 'none';
      adminLogin(email, password).then(function(result) {
        if (result.success) {
          window.location.href = 'index.html';
        } else {
          errEl.textContent = result.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      });
    });
  </script>
</body>
</html>
