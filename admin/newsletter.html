  <div class="admin-main">
    <header class="admin-header">
      <div class="admin-header-left">
        <button class="admin-hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2>Newsletter</h2>
      </div>
      <div class="admin-header-right">
        <span class="admin-user" id="admin-user-name"></span>
        <a href="#" id="admin-logout-btn" class="btn-admin btn-admin-secondary btn-admin-sm" style="text-decoration:none;">Déconnexion</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="stat-cards" style="margin-bottom:24px;">
        <div class="stat-card"><h3>Abonnés</h3><div class="stat-value" id="stat-total">—</div></div>
        <div class="stat-card"><h3>Nouveaux (30 jours)</h3><div class="stat-value" id="stat-new">—</div></div>
      </div>
      <div class="admin-toolbar">
        <div class="admin-toolbar-left">
          <div class="admin-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Rechercher un email...">
          </div>
        </div>
        <div class="admin-toolbar-right">
          <button class="btn-admin btn-admin-secondary btn-admin-sm" onclick="exportNewsletterCSV()">Exporter CSV</button>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-body" style="padding:0;">
          <table class="admin-table">
            <thead><tr><th>Email</th><th>Date d'inscription</th><th>Statut</th></tr></thead>
            <tbody id="newsletter-body"></tbody>
          </table>
          <div class="admin-empty" id="newsletter-empty" style="display:none;"><p>Aucun abonné.</p></div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    var ABONNES = [
      { email: "jean.dupont@email.com", date: "2026-03-15", active: true },
      { email: "sarah.martin@email.com", date: "2026-04-02", active: true },
      { email: "marie.lambert@email.com", date: "2026-04-18", active: true },
      { email: "paul.dubois@email.com", date: "2026-05-01", active: true },
      { email: "sophie.petit@email.com", date: "2026-05-10", active: true },
      { email: "lucas.moreau@email.com", date: "2026-05-20", active: false },
      { email: "emma.bernard@email.com", date: "2026-05-25", active: true },
      { email: "thomas.leroy@email.com", date: "2026-06-01", active: true },
      { email: "client.nouveau@email.com", date: "2026-06-03", active: true },
      { email: "fan.zanka@email.com", date: "2026-06-04", active: true }
    ];
    var now = new Date();
    var thirtyDaysAgo = new Date(now.getTime() - 30 * 86400000);
    var total = ABONNES.filter(function(a) { return a.active; }).length;
    var newCount = ABONNES.filter(function(a) { return a.active && new Date(a.date) >= thirtyDaysAgo; }).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-new').textContent = '+' + newCount;
    function renderAbonnes(list) {
      var tbody = document.getElementById('newsletter-body');
      var empty = document.getElementById('newsletter-empty');
      tbody.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(function(a) {
        tbody.innerHTML += '<tr>' +
          '<td>' + a.email + '</td>' +
          '<td>' + formatDate(a.date) + '</td>' +
          '<td>' + (a.active ? '<span style="color:var(--admin-success);">● Actif</span>' : '<span style="color:var(--admin-text-secondary);">● Désabonné</span>') + '</td>' +
        '</tr>';
      });
    }
    renderAbonnes(ABONNES);
    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      renderAbonnes(ABONNES.filter(function(a) { return a.email.toLowerCase().indexOf(q) > -1; }));
    });
    function exportNewsletterCSV() {
      var lines = ABONNES.filter(function(a) { return a.active; }).map(function(a) { return a.email + ',' + a.date + ',Actif'; });
      var blob = new Blob(['\ufeffEmail,Date,Statut\n' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      var link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'zanka-newsletter.csv';
      link.click();
      showToast('Export CSV téléchargé', 'success');
    }
  </script>
</body>
