      <a href="settings.html" class="admin-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Paramètres</a>
    </nav>
    <div class="admin-sidebar-footer"><a href="../index.html" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Voir le site</a></div>
  </aside>
  <div class="admin-main">
    <header class="admin-header">
      <div class="admin-header-left">
        <button class="admin-hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2>Codes Promo</h2>
      </div>
      <div class="admin-header-right">
        <span class="admin-user" id="admin-user-name"></span>
        <a href="#" id="admin-logout-btn" class="btn-admin btn-admin-secondary btn-admin-sm" style="text-decoration:none;">Déconnexion</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-toolbar">
        <div class="admin-toolbar-left"></div>
        <div class="admin-toolbar-right">
          <button class="btn-admin btn-admin-primary" onclick="openCouponModal()">+ Nouveau code promo</button>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-body" style="padding:0;">
          <table class="admin-table">
            <thead><tr><th>Code</th><th>Type</th><th>Valeur</th><th>Min. commande</th><th>Utilisations</th><th>Expire le</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody id="coupons-body"></tbody>
          </table>
          <div class="admin-empty" id="coupons-empty" style="display:none;"><p>Aucun code promo.</p></div>
        </div>
      </div>
    </div>
  </div>
  <div class="admin-modal-overlay" id="coupon-modal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="modal-title">Nouveau code promo</h3>
        <button class="admin-modal-close" onclick="closeCouponModal()">&times;</button>
      </div>
      <div class="admin-modal-body">
        <form id="coupon-form">
          <div class="form-row">
            <div class="form-group">
              <label for="coupon-code">Code</label>
              <input type="text" id="coupon-code" placeholder="PROMO20" required style="text-transform:uppercase;">
            </div>
            <div class="form-group">
              <label for="coupon-type">Type</label>
              <select id="coupon-type">
                <option value="pourcentage">Pourcentage</option>
                <option value="fixe">Montant fixe</option>
                <option value="livraison">Livraison offerte</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="coupon-value">Valeur</label>
              <input type="number" id="coupon-value" step="0.01" min="0" placeholder="20" required>
            </div>
            <div class="form-group">
              <label for="coupon-min">Montant minimum (€)</label>
              <input type="number" id="coupon-min" step="0.01" min="0" placeholder="0">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="coupon-max-uses">Utilisations max (0 = illimité)</label>
              <input type="number" id="coupon-max-uses" min="0" value="0">
            </div>
            <div class="form-group">
              <label for="coupon-expires">Date d'expiration</label>
              <input type="date" id="coupon-expires">
            </div>
          </div>
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn-admin btn-admin-secondary" onclick="closeCouponModal()">Annuler</button>
        <button class="btn-admin btn-admin-primary" onclick="saveCoupon()">Enregistrer</button>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    var COUPONS = [
      { code: "BIENVENUE10", type: "pourcentage", value: 10, minOrder: 0, uses: 5, maxUses: 100, expires: "2026-12-31", active: true },
      { code: "ZANKA20", type: "pourcentage", value: 20, minOrder: 200, uses: 12, maxUses: 50, expires: "2026-09-30", active: true },
      { code: "LIVRAISON", type: "livraison", value: 0, minOrder: 0, uses: 8, maxUses: 0, expires: "2026-12-31", active: true },
      { code: "ETE2026", type: "fixe", value: 50, minOrder: 500, uses: 0, maxUses: 30, expires: "2026-08-31", active: true },
      { code: "VIP25", type: "pourcentage", value: 25, minOrder: 1000, uses: 1, maxUses: 10, expires: "2026-07-15", active: false }
    ];
    var editingIndex = -1;
    function renderCoupons(list) {
      var tbody = document.getElementById('coupons-body');
      var empty = document.getElementById('coupons-empty');
      tbody.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(function(c, idx) {
        var typeLabel = { pourcentage: '%', fixe: '€', livraison: '—' } [c.type] || '';
        var valueDisplay = c.type === 'livraison' ? 'Livraison offerte' : (c.value + (typeLabel === '%' ? '%' : ' €'));
        var minDisplay = c.minOrder > 0 ? formatPrix(c.minOrder) : 'Aucun';
        var usesDisplay = c.uses + (c.maxUses > 0 ? '/' + c.maxUses : '');
        var expiresDisplay = c.expires ? formatDate(c.expires) : 'Jamais';
        var now = new Date();
        var expDate = new Date(c.expires);
        var isExpired = c.expires && expDate < now;
        tbody.innerHTML += '<tr>' +
          '<td><strong style="font-family:monospace;letter-spacing:1px;">' + c.code + '</strong></td>' +
          '<td>' + (c.type === 'pourcentage' ? 'Pourcentage' : c.type === 'fixe' ? 'Montant fixe' : 'Livraison') + '</td>' +
          '<td>' + valueDisplay + '</td>' +
          '<td>' + minDisplay + '</td>' +
          '<td>' + usesDisplay + '</td>' +
          '<td>' + expiresDisplay + '</td>' +
          '<td>' + (isExpired ? '<span style="color:var(--admin-danger);">Expiré</span>' : c.active ? '<span style="color:var(--admin-success);">Actif</span>' : '<span style="color:var(--admin-text-secondary);">Inactif</span>') + '</td>' +
          '<td><button class="btn-admin btn-admin-secondary btn-admin-xs" onclick="editCoupon(' + idx + ')">Modifier</button> <button class="btn-admin btn-admin-danger btn-admin-xs" onclick="deleteCoupon(' + idx + ')">Suppr.</button></td>' +
        '</tr>';
      });
    }
    renderCoupons(COUPONS);
    function openCouponModal(data) {
      document.getElementById('coupon-modal').classList.add('open');
      if (data) {
        document.getElementById('modal-title').textContent = 'Modifier le code promo';
        document.getElementById('coupon-code').value = data.code;
        document.getElementById('coupon-type').value = data.type;
        document.getElementById('coupon-value').value = data.value;
        document.getElementById('coupon-min').value = data.minOrder;
        document.getElementById('coupon-max-uses').value = data.maxUses;
        document.getElementById('coupon-expires').value = data.expires;
      } else {
        document.getElementById('modal-title').textContent = 'Nouveau code promo';
        document.getElementById('coupon-code').value = '';
        document.getElementById('coupon-type').value = 'pourcentage';
        document.getElementById('coupon-value').value = '';
        document.getElementById('coupon-min').value = '';
        document.getElementById('coupon-max-uses').value = '0';
        document.getElementById('coupon-expires').value = '';
        editingIndex = -1;
      }
    }
    function closeCouponModal() {
      document.getElementById('coupon-modal').classList.remove('open');
    }
    function editCoupon(idx) {
      editingIndex = idx;
      openCouponModal(COUPONS[idx]);
    }
    function deleteCoupon(idx) {
      if (confirm('Supprimer le code ' + COUPONS[idx].code + ' ?')) {
        COUPONS.splice(idx, 1);
        renderCoupons(COUPONS);
        showToast('Code promo supprimé.', 'success');
      }
    }
    function saveCoupon() {
      var code = document.getElementById('coupon-code').value.trim().toUpperCase();
      var type = document.getElementById('coupon-type').value;
      var value = parseFloat(document.getElementById('coupon-value').value) || 0;
      var minOrder = parseFloat(document.getElementById('coupon-min').value) || 0;
      var maxUses = parseInt(document.getElementById('coupon-max-uses').value) || 0;
      var expires = document.getElementById('coupon-expires').value;
      if (!code) { showToast('Veuillez entrer un code.', 'error'); return; }
      if (type !== 'livraison' && value <= 0) { showToast('Veuillez entrer une valeur valide.', 'error'); return; }
      var data = { code: code, type: type, value: value, minOrder: minOrder, uses: 0, maxUses: maxUses, expires: expires, active: true };
      if (editingIndex >= 0) {
        data.uses = COUPONS[editingIndex].uses;
        COUPONS[editingIndex] = data;
        showToast('Code promo mis à jour.', 'success');
      } else {
        COUPONS.push(data);
        showToast('Code promo créé.', 'success');
      }
      renderCoupons(COUPONS);
      closeCouponModal();
    }
  </script>
</body>
</html>
