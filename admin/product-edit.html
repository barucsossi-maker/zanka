</head>

      <a href="newsletter.html" class="admin-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Newsletter</a>
      <a href="settings.html" class="admin-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Paramètres</a>
    </nav>
    <div class="admin-sidebar-footer"><a href="../index.html" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Voir le site</a></div>
  </aside>
  <div class="admin-main">
    <header class="admin-header">
      <div class="admin-header-left">
        <button class="admin-hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2 id="page-title">Nouveau produit</h2>
      </div>
      <div class="admin-header-right">
        <span class="admin-user" id="admin-user-name"></span>
        <a href="#" id="admin-logout-btn" class="btn-admin btn-admin-secondary btn-admin-sm" style="text-decoration:none;">Déconnexion</a>
      </div>
    </header>
    <div class="admin-content">
      <a href="products.html" style="font-size:0.8rem;color:var(--admin-primary);text-decoration:none;display:inline-block;margin-bottom:20px;">&larr; Retour aux produits</a>
      <form class="admin-form" id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Nom du produit</label>
            <input type="text" id="name" placeholder="Ex: Sac à Dos Zephyr" required>
          </div>
          <div class="form-group">
            <label for="slug">Slug (URL)</label>
            <input type="text" id="slug" placeholder="sac-a-dos-zephyr" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="category">Catégorie</label>
            <select id="category" required>
              <option value="">Sélectionner...</option>
              <option value="backpacks">Backpacks</option>
              <option value="hommes">Hommes</option>
              <option value="femmes">Femmes</option>
            </select>
          </div>
          <div class="form-group">
            <label for="price">Prix (€)</label>
            <input type="number" id="price" step="0.01" min="0" placeholder="850" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="comparePrice">Prix barré (€) — optionnel</label>
            <input type="number" id="comparePrice" step="0.01" min="0" placeholder="1200">
          </div>
          <div class="form-group">
            <label for="stock">Stock</label>
            <input type="number" id="stock" min="0" placeholder="10" required>
          </div>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Description du produit..." required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="image">URL image principale</label>
            <input type="url" id="image" placeholder="https://images.unsplash.com/..." required>
          </div>
          <div class="form-group">
            <label for="colors">Couleurs (séparées par virgule)</label>
            <input type="text" id="colors" placeholder="Sable, Noir, Chocolat">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="isNew"> <span>Nouveauté</span>
            </label>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="isBestseller"> <span>Best-seller</span>
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-admin btn-admin-primary">Enregistrer le produit</button>
          <a href="products.html" class="btn-admin btn-admin-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    var PRODUITS = [
      { id: "zephyr", name: "Sac à Dos Zephyr", slug: "sac-a-dos-zephyr", category: "backpacks", price: 850, comparePrice: null, stock: 12, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1601924994987-69e26d50e8bf?w=600&q=80", colors: "Sable, Noir, Chocolat", description: "Sac à dos en cuir pleine fleur. Compartiment rembourré pour ordinateur 15 pouces." },
      { id: "aria", name: "Sac Cabas Aria", slug: "sac-cabas-aria", category: "femmes", price: 1450, comparePrice: 1800, stock: 5, isNew: false, isBestseller: true, image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600&q=80", colors: "Sable, Écru, Brun", description: "Cabas en cuir grainé. Anses en cuir tressé." },
      { id: "berlinois", name: "Sacoche Berlinois", slug: "sacoche-berlinois", category: "hommes", price: 450, comparePrice: null, stock: 8, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=600&q=80", colors: "Noir, Brun", description: "Sacoche en cuir lisse. Bandoulière ajustable." },
      { id: "lune", name: "Sac à Main Lune", slug: "sac-a-main-lune", category: "femmes", price: 1280, comparePrice: null, stock: 3, isNew: false, isBestseller: true, image: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600&q=80", colors: "Sable, Noir", description: "Sac à main en cuir souple. Forme demi-lune iconique." },
      { id: "voyageur", name: "Sac à Dos Voyageur", slug: "sac-a-dos-voyageur", category: "backpacks", price: 1200, comparePrice: 1500, stock: 6, isNew: false, isBestseller: false, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=600&q=80", colors: "Chocolat, Noir", description: "Grand sac à dos voyage en cuir pleine fleur." },
      { id: "nova", name: "Sac Bandoulière Nova", slug: "sac-bandouliere-nova", category: "femmes", price: 890, comparePrice: null, stock: 10, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?w=600&q=80", colors: "Écru, Sable, Noir", description: "Sac bandoulière en cuir grainé." },
      { id: "executive", name: "Porte-Documents Executive", slug: "porte-documents-executive", category: "hommes", price: 890, comparePrice: null, stock: 4, isNew: false, isBestseller: false, image: "https://images.unsplash.com/photo-1594226801341-41427b4e5c22?w=600&q=80", colors: "Noir, Brun", description: "Porte-documents en cuir pleine fleur." },
      { id: "soir", name: "Pochette du Soir", slug: "pochette-du-soir", category: "femmes", price: 650, comparePrice: null, stock: 2, isNew: true, isBestseller: false, image: "https://images.unsplash.com/photo-1547949003-9792a18a2601?w=600&q=80", colors: "Noir, Sable", description: "Pochette du soir en cuir laqué." }
    ];
    var params = new URLSearchParams(window.location.search);
    var productId = params.get('id');
    var editMode = false;
    if (productId) {
      editMode = true;
      document.getElementById('page-title').textContent = 'Modifier le produit';
      for (var i = 0; i < PRODUITS.length; i++) {
        if (PRODUITS[i].id === productId) {
          var p = PRODUITS[i];
          document.getElementById('product-id').value = p.id;
          document.getElementById('name').value = p.name;
          document.getElementById('slug').value = p.slug;
          document.getElementById('category').value = p.category;
          document.getElementById('price').value = p.price;
          document.getElementById('comparePrice').value = p.comparePrice || '';
          document.getElementById('stock').value = p.stock;
          document.getElementById('description').value = p.description;
          document.getElementById('image').value = p.image;
          document.getElementById('colors').value = p.colors;
          document.getElementById('isNew').checked = p.isNew;
          document.getElementById('isBestseller').checked = p.isBestseller;
          break;
        }
      }
    }
    document.getElementById('product-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var data = {
        id: document.getElementById('product-id').value || Date.now().toString(36),
        name: document.getElementById('name').value.trim(),
        slug: document.getElementById('slug').value.trim(),
        category: document.getElementById('category').value,
        price: parseFloat(document.getElementById('price').value),
        comparePrice: document.getElementById('comparePrice').value ? parseFloat(document.getElementById('comparePrice').value) : null,
        stock: parseInt(document.getElementById('stock').value),
        description: document.getElementById('description').value.trim(),
        image: document.getElementById('image').value.trim(),
        colors: document.getElementById('colors').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean),
        isNew: document.getElementById('isNew').checked,
        isBestseller: document.getElementById('isBestseller').checked
      };
      if (editMode) {
        for (var i = 0; i < PRODUITS.length; i++) {
          if (PRODUITS[i].id === productId) {
            PRODUITS[i] = data;
            break;
          }
        }
        showToast('Produit "' + data.name + '" mis à jour avec succès.', 'success');
      } else {
        PRODUITS.push(data);
        showToast('Produit "' + data.name + '" créé avec succès.', 'success');
      }
      setTimeout(function() { window.location.href = 'products.html'; }, 1000);
    });
    document.getElementById('name').addEventListener('input', function() {
      if (!editMode) {
        var slug = this.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
        document.getElementById('slug').value = slug;
      }
    });
  </script>
</body>
</html>
