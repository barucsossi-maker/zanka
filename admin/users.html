      <a href="settings.html" class="admin-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Paramètres</a>

  <div class="admin-main">
    <header class="admin-header">
      <div class="admin-header-left">
        <button class="admin-hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2>Utilisateurs</h2>
      </div>
      <div class="admin-header-right">
        <span class="admin-user" id="admin-user-name"></span>
        <a href="#" id="admin-logout-btn" class="btn-admin btn-admin-secondary btn-admin-sm" style="text-decoration:none;">Déconnexion</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-toolbar">
        <div class="admin-toolbar-left">
          <div class="admin-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Rechercher un client...">
          </div>
        </div>
        <div class="admin-toolbar-right">
          <span style="font-size:0.85rem;color:var(--admin-text-secondary);" id="user-count">— inscrits</span>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-body" style="padding:0;">
          <table class="admin-table">
            <thead><tr><th>Client</th><th>Email</th><th>Inscrit le</th><th>Commandes</th><th>Total dépensé</th><th>Statut</th></tr></thead>
            <tbody id="users-body"></tbody>
          </table>
          <div class="admin-empty" id="users-empty" style="display:none;"><p>Aucun utilisateur trouvé.</p></div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    var UTILISATEURS = [
      { name: "Jean Dupont", email: "demo@zanka.fr", initials: "JD", createdAt: "2026-03-15", ordersCount: 3, totalSpent: 4650.08, active: true },
      { name: "Sarah Martin", email: "sarah@exemple.fr", initials: "SM", createdAt: "2026-04-02", ordersCount: 2, totalSpent: 2546.16, active: true },
      { name: "Marie Lambert", email: "marie@exemple.fr", initials: "ML", createdAt: "2026-04-18", ordersCount: 1, totalSpent: 1543.08, active: true },
      { name: "Paul Dubois", email: "paul@exemple.fr", initials: "PD", createdAt: "2026-05-01", ordersCount: 1, totalSpent: 1440, active: true },
      { name: "Sophie Petit", email: "sophie@exemple.fr", initials: "SP", createdAt: "2026-05-10", ordersCount: 1, totalSpent: 2136, active: true },
      { name: "Lucas Moreau", email: "lucas@exemple.fr", initials: "LM", createdAt: "2026-05-20", ordersCount: 1, totalSpent: 968.28, active: false },
      { name: "Emma Bernard", email: "emma@exemple.fr", initials: "EB", createdAt: "2026-05-25", ordersCount: 0, totalSpent: 0, active: true },
      { name: "Thomas Leroy", email: "thomas@exemple.fr", initials: "TL", createdAt: "2026-06-01", ordersCount: 0, totalSpent: 0, active: true }
    ];
    document.getElementById('user-count').textContent = UTILISATEURS.length + ' inscrits';
    function renderUsers(list) {
      var tbody = document.getElementById('users-body');
      var empty = document.getElementById('users-empty');
      tbody.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(function(u) {
        tbody.innerHTML += '<tr>' +
          '<td><div style="display:flex;align-items:center;gap:10px;"><div class="user-avatar-placeholder">' + u.initials + '</div><strong>' + u.name + '</strong></div></td>' +
          '<td>' + u.email + '</td>' +
          '<td>' + formatDate(u.createdAt) + '</td>' +
          '<td>' + u.ordersCount + '</td>' +
          '<td>' + (u.totalSpent > 0 ? formatPrix(u.totalSpent) : '—') + '</td>' +
          '<td>' + (u.active ? '<span style="color:var(--admin-success);">Actif</span>' : '<span style="color:var(--admin-danger);">Inactif</span>') + '</td>' +
        '</tr>';
      });
    }
    renderUsers(UTILISATEURS);
    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      var filtered = UTILISATEURS.filter(function(u) {
        return u.name.toLowerCase().indexOf(q) > -1 || u.email.toLowerCase().indexOf(q) > -1;
      });
      renderUsers(filtered);
    });
  </script>
</body>
</html>
