    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-body" style="padding:0;">

            <thead><tr><th>Date</th><th>Nom</th><th>Email</th><th>Sujet</th><th>Message</th><th>Statut</th></tr></thead>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    var tousLesMessages = [];

    function renderMessages(list) {
      var tbody = document.getElementById('messages-body');
      var empty = document.getElementById('messages-empty');
      tbody.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(function(m) {
        var statusClass = m.status === 'non-lu' ? 'color:var(--admin-primary);font-weight:600;' : 'color:var(--admin-text-secondary);';
        var statusText = m.status === 'non-lu' ? 'Non lu' : 'Lu';
        var date = m.date ? new Date(m.date).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
        tbody.innerHTML += '<tr style="' + (m.status === 'non-lu' ? 'background:var(--admin-bg-hover);' : '') + '">' +
          '<td style="white-space:nowrap;font-size:0.8rem;">' + date + '</td>' +
          '<td><strong>' + m.nom + '</strong></td>' +
          '<td><a href="mailto:' + m.email + '" style="color:var(--admin-primary);">' + m.email + '</a></td>' +
          '<td>' + m.sujet + '</td>' +
          '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + m.message.replace(/"/g,'&quot;') + '">' + m.message + '</td>' +
          '<td><span style="' + statusClass + '">' + statusText + '</span></td>' +
        '</tr>';
      });
    }

    function chargerMessages() {
      if (typeof window.db !== 'undefined' && window.db) {
        window.db.collection('contacts').orderBy('date', 'desc').onSnapshot(function(snapshot) {
          tousLesMessages = [];
          snapshot.forEach(function(doc) {
            var m = doc.data();
            m.id = doc.id;
            tousLesMessages.push(m);
          });
          renderMessages(tousLesMessages);
        }, function(err) {
          console.warn('Firestore erreur, fallback localStorage:', err);
          chargerMessagesFallback();
        });
      } else {
        chargerMessagesFallback();
      }
    }

    function chargerMessagesFallback() {
      try {
        tousLesMessages = JSON.parse(localStorage.getItem('zanka_contacts') || '[]');
      } catch(e) { tousLesMessages = []; }
      renderMessages(tousLesMessages);
    }

    chargerMessages();
  </script>
