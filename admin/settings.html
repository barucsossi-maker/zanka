  <div class="admin-main">
    <header class="admin-header">
      <div class="admin-header-left">
        <button class="admin-hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2>Paramètres</h2>
      </div>
      <div class="admin-header-right">
        <span class="admin-user" id="admin-user-name"></span>
        <a href="#" id="admin-logout-btn" class="btn-admin btn-admin-secondary btn-admin-sm" style="text-decoration:none;">Déconnexion</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-form" style="max-width:700px;">
        <div class="settings-section">
          <h3>Boutique</h3>
          <div class="form-group">
            <label for="shop-name">Nom de la boutique</label>
            <input type="text" id="shop-name" value="ZANKA">
          </div>
          <div class="form-group">
            <label for="shop-email">Email de contact</label>
            <input type="email" id="shop-email" value="contact@zanka.fr">
          </div>
          <div class="form-group">
            <label for="shop-phone">Téléphone</label>
            <input type="text" id="shop-phone" value="+33 1 23 45 67 89">
          </div>
        </div>
        <div class="settings-section">
          <h3>Livraison</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="free-shipping-min">Livraison offerte à partir de (€)</label>
              <input type="number" id="free-shipping-min" value="200" min="0">
            </div>
            <div class="form-group">
              <label for="standard-rate">Tarif standard (€)</label>
              <input type="number" id="standard-rate" step="0.01" value="5.90" min="0">
            </div>
          </div>
          <div class="form-group">
            <label for="express-rate">Tarif express (€)</label>
            <input type="number" id="express-rate" step="0.01" value="12.90" min="0">
          </div>
        </div>
        <div class="settings-section">
          <h3>Réseaux sociaux</h3>
          <div class="form-group">
            <label for="social-instagram">Instagram</label>
            <input type="url" id="social-instagram" value="https://instagram.com/zanka">
          </div>
          <div class="form-group">
            <label for="social-facebook">Facebook</label>
            <input type="url" id="social-facebook" value="https://facebook.com/zanka">
          </div>
          <div class="form-group">
            <label for="social-pinterest">Pinterest</label>
            <input type="url" id="social-pinterest" value="https://pinterest.com/zanka">
          </div>
        </div>
        <div class="settings-section">
          <h3>TVA</h3>
          <div class="form-group">
            <label for="tva-rate">Taux de TVA (%)</label>
            <input type="number" id="tva-rate" step="0.1" value="20" min="0" max="100">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-admin btn-admin-primary" onclick="saveSettings()">Enregistrer les paramètres</button>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
  <script>
    adminAuthCheck();
    initAdminLayout();
    function saveSettings() {
      var settings = {
        shopName: document.getElementById('shop-name').value.trim(),
        shopEmail: document.getElementById('shop-email').value.trim(),
        shopPhone: document.getElementById('shop-phone').value.trim(),
        freeShippingMin: parseFloat(document.getElementById('free-shipping-min').value) || 200,
        standardRate: parseFloat(document.getElementById('standard-rate').value) || 5.90,
        expressRate: parseFloat(document.getElementById('express-rate').value) || 12.90,
        instagram: document.getElementById('social-instagram').value.trim(),
        facebook: document.getElementById('social-facebook').value.trim(),
        pinterest: document.getElementById('social-pinterest').value.trim(),
        tvaRate: parseFloat(document.getElementById('tva-rate').value) || 20
      };
      try { localStorage.setItem('zanka_admin_settings', JSON.stringify(settings)); } catch(e) {}
      showToast('Paramètres enregistrés avec succès.', 'success');
    }
    try {
      var saved = JSON.parse(localStorage.getItem('zanka_admin_settings'));
      if (saved) {
        if (saved.shopName) document.getElementById('shop-name').value = saved.shopName;
        if (saved.shopEmail) document.getElementById('shop-email').value = saved.shopEmail;
        if (saved.shopPhone) document.getElementById('shop-phone').value = saved.shopPhone;
        if (saved.freeShippingMin) document.getElementById('free-shipping-min').value = saved.freeShippingMin;
        if (saved.standardRate) document.getElementById('standard-rate').value = saved.standardRate;
        if (saved.expressRate) document.getElementById('express-rate').value = saved.expressRate;
        if (saved.instagram) document.getElementById('social-instagram').value = saved.instagram;
        if (saved.facebook) document.getElementById('social-facebook').value = saved.facebook;
        if (saved.pinterest) document.getElementById('social-pinterest').value = saved.pinterest;
        if (saved.tvaRate) document.getElementById('tva-rate').value = saved.tvaRate;
      }
    } catch(e) {}
  </script>
</body>
</html>
