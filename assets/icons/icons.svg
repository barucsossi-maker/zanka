<!-- =============================================================
 * ICONS — Icônes SVG ZANKA (inline pour éviter les requêtes HTTP)
 * =============================================================
 * Toutes les icônes en 24x24, stroke-width 1.5, currentColor.
 * Pourquoi inline plutôt que <img> ?
 * → On peut changer la couleur via CSS (color: ...)
 * → Pas de requête HTTP = plus rapide
 * → Accessibles (aria-label)
 * ============================================================= -->

<!-- Icône Compte / Utilisateur -->
<svg id="icon-compte" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
  <circle cx="12" cy="7" r="4"/>
</svg>

<!-- Icône Panier / Shopping Bag -->
<svg id="icon-panier" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
  <line x1="3" y1="6" x2="21" y2="6"/>
  <path d="M16 10a4 4 0 0 1-8 0"/>
</svg>

<!-- Icône Recherche -->
<svg id="icon-recherche" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"/>
  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
</svg>

<!-- Icône Menu (Hamburger) -->
